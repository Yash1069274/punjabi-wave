services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: punjabi_wave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d punjabi_wave"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
