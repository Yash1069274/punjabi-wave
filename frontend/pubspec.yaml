name: punjabi_wave
version: 0.1.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  flutter_animate: ^4.5.2
  vector_math: ^2.1.4
  cached_network_image: ^3.4.1
  palette_generator: ^0.3.3+5
  lottie: ^3.2.0
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/shaders/
    - assets/images/
